<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SportsGauge - India's AI-Powered Sports Talent Assessment Platform. Discover, evaluate, and nurture the next generation of sporting champions through cutting-edge computer vision and biomechanical analysis." />
    <meta name="keywords" content="sports assessment, talent identification, AI sports, Khelo India, athlete evaluation, sports technology" />
    <title>SportsGauge — AI-Powered Sports Talent Assessment</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="theme-color" content="#0a0e1a" />
    <script>
      try {
        var t = localStorage.getItem('sportsgauge_theme');
        document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        if (t === 'light') document.querySelector('meta[name="theme-color"]').content = '#f8fafc';
      } catch (e) { document.documentElement.classList.add('dark'); }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
